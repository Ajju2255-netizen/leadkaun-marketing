# Cloudflare Workers config for Leadkaun marketing site
# Powered by @opennextjs/cloudflare — full Next.js ISR on Workers + R2 + KV.
# See vault: 08 - Website/Architecture/Cloudflare-R2-ISR-Migration.md

name = "leadkaun-marketing"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Account scoping (also via CF_ACCOUNT_ID env at deploy time)
account_id = "19650c4ca8e6e4ed2699a0b288206b03"

# Workers PAID plan: the per-request CPU ceiling rises to the Paid runtime
# default (~30s) automatically — no [limits] block required to clear the Free
# plan's old ~10ms cap that 503'd cold on-demand SSR of the ~74k PSEO URLs.
#
# NOTE: an explicit `[limits] cpu_ms` is omitted because the version-create API
# still rejects it with "CPU limits are not supported for the Free plan
# [code: 100328]" (a billing-entitlement propagation lag — persists across a
# wrangler upgrade and a fresh `wrangler login`, while the dashboard shows Paid
# as the current plan). That API check is separate from runtime enforcement, so
# the Paid runtime ceiling applies regardless. Re-add once 100328 clears:
#   [limits]
#   cpu_ms = 30000

# NOTE: An earlier attempt added a SQLite-backed Durable Object revalidation
# queue (NEXT_CACHE_DO_QUEUE / DOQueueHandler + WORKER_SELF_REFERENCE) to
# replace OpenNext's throwing "Dummy queue". The DO class was not wired into
# the worker at runtime, so stale-revalidation reads 503'd and took down core
# pages. Reverted to the default queue (see open-next.config.ts). The v1
# migration that created DOQueueHandler is already applied to the account; it
# is harmless without a binding (no DO class is exported, none is invoked).

# ─────────────────────────────────────────────────────────────────────────
# Custom domains — apex + www serve the marketing site.
# NOTE: the conflicting Cloudflare DNS records must be removed first
# (apex A → Vercel, www CNAME → Vercel); the app now lives at app.leadkaun.com.
# ─────────────────────────────────────────────────────────────────────────
routes = [
  { pattern = "leadkaun.com", custom_domain = true },
  { pattern = "www.leadkaun.com", custom_domain = true },
]

# ─────────────────────────────────────────────────────────────────────────
# Static assets (CSS, JS, images bundled by Next/OpenNext)
# ─────────────────────────────────────────────────────────────────────────
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─────────────────────────────────────────────────────────────────────────
# R2 — OpenNext incremental cache (page bodies + fetch responses)
# Bucket created with: wrangler r2 bucket create leadkaun-isr-cache
# ─────────────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "leadkaun-isr-cache"

# ─────────────────────────────────────────────────────────────────────────
# R2 — PSEO data layer (10 JSON files)
# Bucket created with: wrangler r2 bucket create leadkaun-pseo
# Read at runtime by lib/pseo/lookup.ts via env.PSEO_DATA
# ─────────────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "PSEO_DATA"
bucket_name = "leadkaun-pseo"

# ─────────────────────────────────────────────────────────────────────────
# KV — OpenNext tag cache (revalidateTag / revalidatePath index)
# Namespace created with: wrangler kv namespace create LEADKAUN_KV
# ─────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "NEXT_TAG_CACHE_KV"
id = "7d3a4efaff294f799b2c94c3765a1d0f"

# ─────────────────────────────────────────────────────────────────────────
# Public env (exposed to the browser bundle via NEXT_PUBLIC_*)
# Server-only secrets go in `.dev.vars` (local) and `wrangler secret put` (prod).
# ─────────────────────────────────────────────────────────────────────────
[vars]
NEXT_PUBLIC_SITE_URL = "https://leadkaun.com"
NEXT_PUBLIC_APP_LOGIN_URL = "https://app.leadkaun.com/login"
NEXT_PUBLIC_APP_REGISTER_URL = "https://app.leadkaun.com/register"
NEXT_PUBLIC_APP_URL = "https://app.leadkaun.com"

# ─────────────────────────────────────────────────────────────────────────
# Observability — request logs + tail in `wrangler tail`
# ─────────────────────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1
